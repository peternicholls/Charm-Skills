    directory: "/examples/setup-wizard"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "go"
  - package-ecosystem: "gomod"
    directory: "/examples/docs-ssh"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "go"
